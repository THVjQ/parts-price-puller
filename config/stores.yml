# ─────────────────────────────────────────────────────────────────────────────
# STORES — SEED ONLY.
#
# On first boot every store below is inserted into the database. After that the
# DATABASE OWNS the calculators: edits made in the site's calculator editor persist
# in data/prices.db and `git pull` will NEVER overwrite them.
#
# What this file still controls after first boot:
#   • adding a NEW store here creates it on the next config reload (seeded values)
#   • removing a store here hides it from the dropdown (its saved calculator is kept)
#   • the "Reset to git defaults" button in the editor re-reads the values below
#
# CALCULATOR
#   retail = cost × multiplyPercent + add
#   …and if `threshold` is set and the cost is OVER it:
#   retail = cost × overMultiplyPercent + overAdd
#
#   multiplyPercent carries GST — 110 = "+10% GST", 130 = "GST plus 20% on the part".
#   add is the labour/fitting dollars.
#
# Rules are keyed "deviceGroup|part", most specific wins, and any field you leave out
# is inherited from the less specific rule:
#
#   "*|*"          the base rule — every part, every device
#   "iphone|*"     every iPhone part
#   "*|LCD"        LCD on every device family
#   "iphone|LCD"   iPhone LCD specifically
#
# Group ids come from config/devices.yml (iphone, samsung-s, samsung-a, other — add
# `google` there when those devices land and it appears in the editor automatically).
# Part keys come from config/parts.yml.
#
# ⚠ These numbers are a STARTING POINT, not your real margins. Set them per store in
#   the UI (Calculator button) — those edits live in the database and git never
#   overwrites them.
# ─────────────────────────────────────────────────────────────────────────────

defaults: &default_calc
  rounding: { mode: up, step: 10, endsWith: null }
  rules:
    # cost × 110% + $90; anything over $250 → cost × 110% + $150
    "*|*":       { multiplyPercent: 110, add: 90, threshold: 250, overAdd: 150 }
    # examples — delete or edit freely, the UI writes this same structure
    "*|BAT_AM":  { add: 60 }
    "*|BAT_SP":  { add: 60 }
    "*|CHARGE_PORT": { add: 70 }

stores:
  - { id: airlie-beach,   name: Airlie Beach,    calculator: *default_calc }
  - { id: alice-springs,  name: Alice Springs,   calculator: *default_calc }
  - { id: armidale,       name: Armidale,        calculator: *default_calc }
