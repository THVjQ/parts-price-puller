# ─────────────────────────────────────────────────────────────────────────────
# DEVICES — the ROWS of the price matrix.   (was the "Devices" tab of the sheet)
#
# Edit this file in GitHub and the live site picks it up within GIT_SYNC_INTERVAL
# seconds (default 60) — no redeploy, no restart.
#
# Per device:
#   name     required. Shown in the matrix AND used as the key prices/pins hang off.
#            ⚠ Renaming a device orphans its existing prices and pins.
#   search   optional. What gets sent to the supplier search. Defaults to `name`.
#   group    optional. Row grouping in the UI (see `groups` below). Defaults to "other".
#   aliases  optional. Extra title spellings that still count as this device.
#   enabled  optional, defaults to true. false = hidden from the matrix + skipped by pulls.
# ─────────────────────────────────────────────────────────────────────────────

# `parts:` on a group pins its exact columns (used for iPad, which only does Digitiser
# + LCD). A group with no `parts:` gets every universal part from parts.yml.
groups:
  - { id: iphone,    label: iPhone }
  - { id: samsung-s, label: Samsung Galaxy S }
  - { id: samsung-a, label: Samsung Galaxy A }
  - { id: samsung-z, label: Samsung Galaxy Z }
  - { id: google,    label: Google Pixel }
  - { id: ipad,      label: iPad, parts: [DIGI, LCD] }
  - { id: other,     label: Other }

devices:
