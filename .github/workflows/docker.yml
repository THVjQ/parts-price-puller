name: Build images

# TrueNAS SCALE cannot build images, so main always keeps a prebuilt pair on ghcr.io:
#   ghcr.io/thvjq/parts-price-puller-web  (the site)
#   ghcr.io/thvjq/parts-price-puller      (the Willard scraper)
on:
  push:
    branches: [main]
    paths: ['web/**', 'scraper/**', '.github/workflows/docker.yml']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: ./web
            image: parts-price-puller-web
          - context: ./scraper
            image: parts-price-puller
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          tags: |
            ghcr.io/thvjq/${{ matrix.image }}:latest
            ghcr.io/thvjq/${{ matrix.image }}:${{ github.sha }}
