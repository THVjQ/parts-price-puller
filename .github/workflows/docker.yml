name: Build scraper image
on:
  push:
    branches: [main]
    paths: ['scraper/**']
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./scraper
          push: true
          tags: |
            ghcr.io/thvjq/parts-price-puller:latest
            ghcr.io/thvjq/parts-price-puller:${{ github.sha }}
