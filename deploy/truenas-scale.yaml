# =====================================================================
#  Parts Price Puller — TrueNAS SCALE stack
#  Paste into TrueNAS: Apps -> Discover Apps -> (top-right) -> "Install via YAML".
#  Same shape as the THVjQ-Website app: named volumes, no host paths, no build,
#  one port behind a Cloudflare tunnel.
# ---------------------------------------------------------------------
#  Site   : http://<truenas-ip>:8084
#  Webhook: http://<truenas-ip>:8084/hooks/pricing
#  Point the Cloudflare tunnel  pricing.thvjq.com.au -> <truenas-ip>:8084
#
#  EDIT THESE:
#   - SITE_PASSWORD    -> staff login password (username is SOSPhonerepairs)
#   - INGEST_KEY       -> openssl rand -hex 32   (same value in BOTH services)
#   - WEBHOOK_SECRET   -> openssl rand -hex 32   (also into the GitHub webhook)
#   - CP_USER/CP_PASS  -> the CrazyParts wholesale login
#
#  LIVE CONFIG: the web container fetch+resets this repo into the ppp_repo volume
#  every GIT_SYNC_INTERVAL seconds and hot-reloads config/*.yml. Add the GitHub
#  webhook below and a push is live in seconds instead:
#    repo -> Settings -> Webhooks -> Add webhook
#      Payload URL : https://pricing.thvjq.com.au/hooks/pricing
#      Content type: application/json
#      Secret      : the same WEBHOOK_SECRET
#      Events      : just the push event      (GitHub pings it -> expect 200 "pong")
#
#  UPDATING THE APP ITSELF (not config): Apps -> parts-price-puller -> ⋮ ->
#  Pull image -> Restart. GitHub Actions rebuilds both images on every push to main.
#
#  ⚠ BACK UP the ppp_data volume — it holds every price, pin and store calculator.
#    Nothing in it is recoverable from git.
# =====================================================================
services:
  web:
    image: ghcr.io/thvjq/parts-price-puller-web:latest
    container_name: ppp-web
    restart: unless-stopped
    ports:
      - "8084:8080"
    environment:
      TZ: Australia/Sydney

      # ── staff login ─────────────────────────────────────────────────────
      AUTH_MODE: password                 # password | cf-access | none
      SITE_USER: "SOSPhonerepairs"
      SITE_PASSWORD: "1234"               # ⬅ EDIT — a deterrent, not a secret
      SECURE_COOKIE: "auto"               # auto = Secure only when reached over https

      # ── machine callers: scraper + Tampermonkey ─────────────────────────
      INGEST_KEY: "⚠ CHANGE ME — openssl rand -hex 32"

      # ── live config from git ────────────────────────────────────────────
      GIT_SYNC: "1"
      GIT_SYNC_INTERVAL: "120"            # fallback poll; the webhook is instant
      GIT_REMOTE: "https://github.com/THVjQ/parts-price-puller.git"
      GIT_BRANCH: "main"
      # GIT_TOKEN: ""                     # only if the repo goes private
      WEBHOOK_SECRET: "⚠ CHANGE ME — openssl rand -hex 32"

      CONFIG_DIR: /repo/config
      REPO_DIR: /repo
      DATA_DIR: /app/data
      PORT: "8080"
    volumes:
      - ppp_repo:/repo                    # the checkout — cloned on first boot
      - ppp_data:/app/data                # prices.db — BACK THIS UP
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  scraper:
    image: ghcr.io/thvjq/parts-price-puller:latest
    container_name: ppp-scraper
    restart: unless-stopped
    environment:
      TZ: Australia/Sydney
      # Container-to-container: the scheduled pull never leaves the app network.
      SITE_URL: "http://web:8080"
      INGEST_KEY: "⚠ CHANGE ME — must match the web service above"

      # ── CrazyParts wholesale login ──────────────────────────────────────
      CP_USER: "⚠ your@crazyparts.login"
      CP_PASS: "⚠ yourpassword"

      # RUN_NOW: "1"        # uncomment for one pull immediately on start (testing)
      # PULL_UNPINNED: "1"  # also fuzzy-search cells with no pin (off by default)
    depends_on:
      web:
        condition: service_started
    # Playwright needs more than the default 64MB of /dev/shm for Chromium.
    shm_size: "1gb"

volumes:
  ppp_repo:
  ppp_data:
